name: Claude Security Review
description: >
  Two-layer security gate. (1) gitleaks: a deterministic, BLOCKING scan of the
  working tree for secrets and identifying values (runs on every push and PR).
  (2) Claude: an advisory LLM review of the PR diff for credential handling,
  secrets hygiene, and auth anti-patterns, posted as PR comments — CRITICAL
  findings fail the check, WARNINGs are advisory. The Claude layer is skipped
  when no anthropic-api-key is supplied or the event isn't a pull_request, so
  the action can be adopted for the secret gate alone.

inputs:
  anthropic-api-key:
    description: Anthropic API key. If omitted, the Claude review layer is skipped (gitleaks still runs).
    required: false
    default: ""
  github-token:
    description: GitHub token for posting PR comments
    required: false
    default: ""
  fail-on-warning:
    description: Whether WARNING severity findings also fail the check
    required: false
    default: "false"
  diff-context-lines:
    description: Number of context lines to include in the diff
    required: false
    default: "5"
  gitleaks-config:
    description: Path to the repo's gitleaks config. Falls back to the action's baseline if absent.
    required: false
    default: ".gitleaks.toml"
  gitleaks-version:
    description: gitleaks release to pin
    required: false
    default: "8.30.1"

outputs:
  findings-count:
    description: Total number of Claude findings
    value: ${{ steps.review.outputs.findings-count }}
  critical-count:
    description: Number of CRITICAL Claude findings
    value: ${{ steps.review.outputs.critical-count }}

runs:
  using: composite
  steps:
    # Layer 1 — deterministic, BLOCKING secret/identifier scan. Runs on every
    # event (push + PR). Scans the working tree (gitleaks `dir`), not history,
    # so a repo's pre-existing history doesn't fail the gate while still
    # catching any new leak. Uses the repo's .gitleaks.toml if present, else the
    # baseline shipped alongside this action.
    - name: Install gitleaks
      shell: bash
      run: |
        v="${{ inputs.gitleaks-version }}"
        curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${v}/gitleaks_${v}_linux_x64.tar.gz" \
          | tar -xz gitleaks
        sudo mv gitleaks /usr/local/bin/

    - name: gitleaks secret scan
      shell: bash
      run: |
        config="${{ inputs.gitleaks-config }}"
        if [ ! -f "$config" ]; then
          echo "No $config in repo — using action baseline."
          config="$GITHUB_ACTION_PATH/gitleaks-baseline.toml"
        fi
        gitleaks dir . --config "$config" --redact --no-banner --exit-code 1

    # Layer 2 — advisory Claude review. PR-only (needs a diff) and only when an
    # API key is supplied. The Python lives in review.py / post_comment.py so
    # this file stays valid YAML.
    - name: Get PR diff
      id: diff
      if: github.event_name == 'pull_request' && inputs.anthropic-api-key != ''
      shell: bash
      run: |
        git fetch origin ${{ github.base_ref }} --depth=1
        DIFF=$(git diff origin/${{ github.base_ref }}...HEAD \
          --unified=${{ inputs.diff-context-lines }} \
          -- '*.py' '*.yml' '*.yaml' '*.json' '*.toml' '*.sh' \
          | head -c 40000)  # cap at ~40KB to stay within context limits
        echo "$DIFF" > /tmp/pr_diff.txt
        echo "diff-size=$(wc -c < /tmp/pr_diff.txt)" >> "$GITHUB_OUTPUT"

    - name: Run Claude security review
      id: review
      if: github.event_name == 'pull_request' && inputs.anthropic-api-key != ''
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: python3 "$GITHUB_ACTION_PATH/review.py"
      # review.py writes review-output / findings-count / critical-count to
      # $GITHUB_OUTPUT directly, so the LLM JSON (which may contain single
      # quotes) never round-trips through a shell command.

    - name: Post PR comment
      if: github.event_name == 'pull_request' && inputs.anthropic-api-key != '' && steps.review.outputs.findings-count != '0'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        FINDINGS: ${{ steps.review.outputs.review-output }}
        DIFF_SIZE: ${{ steps.diff.outputs.diff-size }}
      run: python3 "$GITHUB_ACTION_PATH/post_comment.py"

    - name: Fail on critical findings
      if: github.event_name == 'pull_request' && inputs.anthropic-api-key != '' && steps.review.outputs.critical-count != '0'
      shell: bash
      run: |
        echo "::error::Security review found ${{ steps.review.outputs.critical-count }} CRITICAL issue(s). See PR comment for details."
        exit 1

    - name: Fail on warnings (if enabled)
      if: github.event_name == 'pull_request' && inputs.anthropic-api-key != '' && inputs.fail-on-warning == 'true' && steps.review.outputs.findings-count != '0'
      shell: bash
      run: |
        echo "::error::Security review found ${{ steps.review.outputs.findings-count }} issue(s) and fail-on-warning is enabled."
        exit 1
